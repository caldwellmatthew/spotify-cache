services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spotifyuser
      POSTGRES_PASSWORD: spotifypass
      POSTGRES_DB: scrubbler
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spotifyuser -d scrubbler']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    profiles: [production]
    build: .
    command: node dist/server/index.js
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://spotifyuser:spotifypass@postgres:5432/scrubbler
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    profiles: [production]
    build: .
    command: node dist/worker/index.js
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://spotifyuser:spotifypass@postgres:5432/scrubbler
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
